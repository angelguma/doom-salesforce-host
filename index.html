<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Doom Host</title>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            width: 100%;
            background: black;
            overflow: hidden;
        }

        #dosbox {
            width: 100vw;
            height: 100vh;
            background: black;
        }
    </style>
</head>

<body>
    <div id="dosbox"></div>

    <script src="https://js-dos.com/cdn/js-dos-api.js"></script>

    <script>
        var dosbox = new Dosbox({
            id: "dosbox",

            onload: function (dosbox) {
                dosbox.run(
                    "https://js-dos.com/cdn/upload/DOOM-@evilution.zip",
                    "./DOOM/DOOM.EXE"
                );
            },

            onrun: function (dosbox, app) {
                console.log("DOOM is running:", app);
            }
        });
    </script>
</body>
</html>
