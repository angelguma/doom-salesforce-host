<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Doom Host</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        #screen {
            width: 100vw;
            height: 100vh;
            background: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #dosbox {
            width: 640px;
            height: 400px;
            transform: scale(2);
            transform-origin: center center;
            image-rendering: pixelated;
        }

        #dosbox canvas {
            width: 640px !important;
            height: 400px !important;
            image-rendering: pixelated;
        }
    </style>
</head>

<body>
    <div id="screen">
        <div id="dosbox"></div>
    </div>

    <script src="https://js-dos.com/cdn/js-dos-api.js"></script>

    <script>
        var dosbox = new Dosbox({
            id: "dosbox",
            onload: function (dosbox) {
                dosbox.run(
                    "https://js-dos.com/cdn/upload/DOOM-@evilution.zip",
                    "./DOOM/DOOM.EXE"
                );
            },
            onrun: function (dosbox, app) {
                console.log("DOOM is running:", app);
            }
        });
    </script>
</body>
</html>
